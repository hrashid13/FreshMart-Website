version: 0.1.0
vars:
  MODEL_NAME: llama3.2:latest

graph:
  id: grocery_store_website
  description: Three agents build a grocery store website from a made-up weekly ad.
  log_level: INFO
  start:
    - Idea Agent

  nodes:
    - id: Idea Agent
      type: agent
      description: Invents a weekly grocery store ad as plain text only.
      context_window: 0
      config:
        name: ${MODEL_NAME}
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |
          You are a copywriter. You only write plain text. No HTML. No code. No JSON.

          Write a weekly ad for FreshMart grocery store using EXACTLY this format
          and nothing else. Do not add any explanation before or after.

          THEME: Summer Savings Week

          DEALS:
          1. Whole Milk - was $3.99, now $2.99, 25% off
          2. Chicken Breast - was $7.99, now $5.99, 25% off
          3. Strawberries - was $4.99, now $2.99, 40% off
          4. Cheddar Cheese - was $5.49, now $3.99, 27% off
          5. Sourdough Bread - was $3.99, now $2.49, 38% off

          RECIPE:
          Name: Summer Berry Smoothie
          Ingredients: strawberries, banana, yogurt, honey, ice
          Steps:
          1. Add all ingredients to a blender.
          2. Blend until smooth.
          3. Pour into a glass and serve cold.

          ANNOUNCEMENT:
          FreshMart is open Monday to Saturday 8am to 9pm and Sunday 9am to 7pm.

          Now write your OWN version following that exact format with different
          made-up items, theme, recipe, and announcement. Plain text only.

    - id: Coder Agent
      type: agent
      description: Builds index.html from the weekly ad content.
      context_window: 0
      config:
        name: ${MODEL_NAME}
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |
          You are an HTML developer. You receive plain text weekly ad content.
          Turn it into a valid HTML file. Follow this template exactly,
          filling in the content from the ad you receive:

          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>FreshMart</title>
          <link rel="stylesheet" href="style.css">
          </head>
          <body>
          <header>
          <h1>FreshMart</h1>
          <p>[THEME HERE]</p>
          </header>
          <section id="deals">
          <div class="card"><h2>[ITEM 1 NAME]</h2><p>[ITEM 1 PRICE INFO]</p></div>
          <div class="card"><h2>[ITEM 2 NAME]</h2><p>[ITEM 2 PRICE INFO]</p></div>
          <div class="card"><h2>[ITEM 3 NAME]</h2><p>[ITEM 3 PRICE INFO]</p></div>
          <div class="card"><h2>[ITEM 4 NAME]</h2><p>[ITEM 4 PRICE INFO]</p></div>
          <div class="card"><h2>[ITEM 5 NAME]</h2><p>[ITEM 5 PRICE INFO]</p></div>
          </section>
          <section id="recipe">
          <h2>[RECIPE NAME]</h2>
          <ul>
          <li>[INGREDIENT 1]</li>
          <li>[INGREDIENT 2]</li>
          <li>[INGREDIENT 3]</li>
          </ul>
          <ol>
          <li>[STEP 1]</li>
          <li>[STEP 2]</li>
          <li>[STEP 3]</li>
          </ol>
          </section>
          <section id="announcement">
          <p>[ANNOUNCEMENT TEXT]</p>
          </section>
          <footer><p>FreshMart. All rights reserved.</p></footer>
          </body>
          </html>

          STEP 1: Output the completed HTML replacing every [PLACEHOLDER] with real content.
          STEP 2: Call save_file with path="index.html" and the full HTML as the content string.
          Do both steps. No explanation. No markdown. No code fences.
        tooling:
          - type: function
            config:
              tools:
                - name: save_file

    - id: Style Agent
      type: agent
      description: Writes style.css for the FreshMart website.
      context_window: 0
      config:
        name: ${MODEL_NAME}
        provider: openai
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        role: |
          You are a CSS developer. You must do two things and nothing else:

          STEP 1: Output this CSS exactly as written below, every line, unchanged:

          body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
          }
          header {
            background-color: #2e7d32;
            color: white;
            text-align: center;
            padding: 1.5em;
          }
          header h1 {
            margin: 0;
            font-size: 2em;
          }
          header p {
            margin: 0.25em 0 0;
            font-size: 1.1em;
          }
          #deals {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 1.5em;
            gap: 1em;
          }
          .card {
            background-color: white;
            border: 2px solid #2e7d32;
            border-radius: 8px;
            padding: 1em;
            min-width: 180px;
            max-width: 220px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
          }
          .card h2 {
            color: #2e7d32;
            font-size: 1em;
            margin: 0 0 0.5em;
          }
          .card p {
            margin: 0;
            font-size: 0.9em;
          }
          #recipe {
            background-color: #e8f5e9;
            padding: 1.5em;
            margin: 1em auto;
            max-width: 700px;
            border-radius: 8px;
          }
          #announcement {
            background-color: #e8f5e9;
            padding: 1.5em;
            margin: 1em auto;
            max-width: 700px;
            border-radius: 8px;
          }
          footer {
            text-align: center;
            padding: 1em;
            background-color: #2e7d32;
            color: white;
            margin-top: 2em;
          }

          STEP 2: Call save_file with path="style.css" and the CSS above as the content string.
          Do both steps. Do not output HTML. Do not add explanation.
        tooling:
          - type: function
            config:
              tools:
                - name: save_file

  edges:
    - from: Idea Agent
      to: Coder Agent
      trigger: true
      carry_data: true
    - from: Coder Agent
      to: Style Agent
      trigger: true
      carry_data: true

  end:
    - Style Agent